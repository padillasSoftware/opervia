name: Setup Project
description: Setup Node, install dependencies, generate Prisma client, and optionally install Playwright.

inputs:
  node-version:
    description: Node version
    required: false
    default: "24"

  generate-prisma:
    description: Generate Prisma client
    required: false
    default: "true"

  install-playwright:
    description: Install Playwright Chromium
    required: false
    default: "false"

  run-migrations:
    description: Run Prisma migrations
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci --no-audit --prefer-offline


    - name: Run migrations
      if: ${{ inputs.run-migrations == 'true' }}
      shell: bash
      run: |
        for attempt in 1 2 3; do
          echo "Running Prisma migrations (attempt $attempt/3)"
          if npm run prisma:migrate; then
            exit 0
          fi

          if [ "$attempt" -eq 3 ]; then
            echo "Prisma migrations failed after 3 attempts."
            exit 1
          fi

          echo "Prisma migrations failed, retrying in 10 seconds..."
          sleep 10
        done

    - name: Generate Prisma Client
      if: ${{ inputs.generate-prisma == 'true' }}
      shell: bash
      run: npm run prisma:generate
      
    - name: Install Playwright browsers
      if: ${{ inputs.install-playwright == 'true' }}
      shell: bash
      run: npx playwright install --with-deps chromium