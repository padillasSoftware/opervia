name: Require Tests

on:
  pull_request:
    branches:
      - staging

jobs:
  require-tests:
    name: Require Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            app:
              - 'app/pages/**'
              - 'app/components/**'
              - 'app/composables/**'
              - 'server/api/**'
              - 'server/utils/**'
              - 'server/middleware/**'
            tests:
              - 'tests/**'

      - name: Require tests when app changes
        if: steps.changes.outputs.app == 'true' && steps.changes.outputs.tests != 'true'
        run: |
          echo "Cambiaste app/server pero no agregaste o modificaste tests."
          exit 1