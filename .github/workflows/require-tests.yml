name: 02 Require Tests

on:
  pull_request:
    branches:
      - staging
  push:
    branches:
      - staging

permissions:
  contents: read

jobs:
  require-tests:
    name: Require Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require tests for application changes
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: node .github/scripts/require-tests.mjs