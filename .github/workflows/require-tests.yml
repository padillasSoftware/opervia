name: 02 Require Tests

on:
  pull_request:
    branches:
      - staging

concurrency:
  group: require-tests-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  require-tests:
    name: Require Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require tests for application changes
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: node .github/scripts/require-tests.mjs