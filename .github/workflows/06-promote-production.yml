name: 06 Promote Production

on:
  workflow_run:
    workflows:
      - 05 Smoke Staging
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Create Production PR
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'staging'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Create release branch and PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch origin master staging

          if git diff --quiet origin/master origin/staging; then
            echo "No file changes to promote from staging to master."
            exit 0
          fi

          EXISTING_PR_COUNT=$(gh pr list \
            --base master \
            --state open \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("release/staging-"))] | length')

          if [ "$EXISTING_PR_COUNT" != "0" ]; then
            echo "A release PR already exists."
            exit 0
          fi

          RELEASE_BRANCH="release/staging-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$RELEASE_BRANCH" origin/staging
          git push origin "$RELEASE_BRANCH"

          gh pr create \
            --base master \
            --head "$RELEASE_BRANCH" \
            --title "Promote staging to production" \
            --body "Automated production promotion after staging smoke tests passed.

          Source commit: $HEAD_SHA
          Workflow run: $RUN_ID"