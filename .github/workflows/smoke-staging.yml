name: 04 Smoke Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: smoke-staging
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Staging
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.STAGING_URL }}
      STAGING_SUPERADMIN_EMAIL: ${{ secrets.STAGING_SUPERADMIN_EMAIL }}
      STAGING_SUPERADMIN_PASSWORD: ${{ secrets.STAGING_SUPERADMIN_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          install-playwright: "true"

      - name: Wait for Netlify deploy for this commit
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Waiting for Netlify deploy for commit: $COMMIT_SHA"

          for i in {1..60}; do
            DEPLOY=$(curl -s \
              -H "Authorization: Bearer $NETLIFY_ACCESS_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys?per_page=50" \
              | jq -c --arg SHA "$COMMIT_SHA" '[.[] | select(.commit_ref == $SHA)][0]')

            if [ "$DEPLOY" = "null" ] || [ -z "$DEPLOY" ]; then
              echo "Deploy for commit not found yet. Attempt $i/60"
              sleep 10
              continue
            fi

            STATE=$(echo "$DEPLOY" | jq -r '.state')
            DEPLOY_URL=$(echo "$DEPLOY" | jq -r '.ssl_url // .url')

            echo "Deploy state: $STATE"
            echo "Deploy URL: $DEPLOY_URL"

            if [ "$STATE" = "ready" ]; then
              echo "Netlify deploy is ready."
              exit 0
            fi

            if [ "$STATE" = "error" ] || [ "$STATE" = "failed" ]; then
              echo "Netlify deploy failed."
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Netlify deploy for commit $COMMIT_SHA."
          exit 1

      - name: Run smoke tests against staging
        run: npx playwright test tests/smoke --project=authenticated

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-staging-report
          path: playwright-report/

  promote:
    name: Create Production PR
    runs-on: ubuntu-latest
    needs: smoke

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR staging to master
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin master staging

          EXISTING_PR_COUNT=$(gh pr list \
            --base master \
            --head staging \
            --state open \
            --json number \
            --jq 'length')

          if [ "$EXISTING_PR_COUNT" != "0" ]; then
            echo "Production PR already exists."
            exit 0
          fi

          if git diff --quiet origin/master...origin/staging; then
            echo "No commits to promote from staging to master."
            exit 0
          fi

          gh pr create \
            --base master \
            --head staging \
            --title "Promote staging to production" \
            --body "Automated promotion after staging smoke tests passed."