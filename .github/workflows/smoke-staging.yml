name: Smoke Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: smoke-staging
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Staging
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.STAGING_URL }}
      QA_SUPERADMIN_EMAIL: ${{ secrets.QA_SUPERADMIN_EMAIL }}
      QA_SUPERADMIN_PASSWORD: ${{ secrets.QA_SUPERADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Wait for Netlify deploy for this commit
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Waiting for Netlify deploy for commit: $COMMIT_SHA"

          for i in {1..60}; do
            DEPLOY=$(curl -s \
              -H "Authorization: Bearer $NETLIFY_ACCESS_TOKEN" \
              "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys?per_page=50" \
              | jq -c --arg SHA "$COMMIT_SHA" '[.[] | select(.commit_ref == $SHA)][0]')

            if [ "$DEPLOY" = "null" ] || [ -z "$DEPLOY" ]; then
              echo "Deploy for commit not found yet. Attempt $i/60"
              sleep 10
              continue
            fi

            STATE=$(echo "$DEPLOY" | jq -r '.state')
            DEPLOY_URL=$(echo "$DEPLOY" | jq -r '.ssl_url // .url')

            echo "Deploy state: $STATE"
            echo "Deploy URL: $DEPLOY_URL"

            if [ "$STATE" = "ready" ]; then
              echo "Netlify deploy is ready."
              exit 0
            fi

            if [ "$STATE" = "error" ] || [ "$STATE" = "failed" ]; then
              echo "Netlify deploy failed."
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for Netlify deploy for commit $COMMIT_SHA."
          exit 1

      - name: Run smoke tests against staging
        run: npx playwright test tests/smoke --project=authenticated

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-staging-report
          path: playwright-report/

  promote:
    name: Create Production PR
    runs-on: ubuntu-latest
    needs: smoke

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create PR staging to main
        run: |
          gh pr create \
            --base main \
            --head staging \
            --title "Promote staging to production" \
            --body "Automated promotion after staging smoke tests passed." \
          || echo "Production PR already exists."
        env:
          GH_TOKEN: ${{ github.token }}