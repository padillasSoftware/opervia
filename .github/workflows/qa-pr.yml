name: 03 QA PR

on:
  pull_request:
    branches:
      - staging

concurrency:
  group: qa-pr-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  playwright:
    name: Playwright QA
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          install-playwright: "true"

      - name: Run Playwright tests
        env:
          SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL }}
          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
          MANAGER_EMAIL: ${{ secrets.MANAGER_EMAIL }}
          MANAGER_PASSWORD: ${{ secrets.MANAGER_PASSWORD }}
          QA_CENTER_ID: ${{ secrets.QA_CENTER_ID }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  auto-merge:
    name: Auto Merge to Staging
    runs-on: ubuntu-latest
    needs: playwright

    steps:
      - name: Merge PR into staging
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --squash --delete-branch
