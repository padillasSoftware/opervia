name: 03 QA PR

on:
  pull_request:
    branches:
      - staging

permissions:
  contents: write
  pull-requests: write

jobs:
  playwright:
    name: Playwright QA
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          install-playwright: "true"

      - name: Run Playwright tests
        env:
          QA_SUPERADMIN_EMAIL: ${{ secrets.QA_SUPERADMIN_EMAIL }}
          QA_SUPERADMIN_PASSWORD: ${{ secrets.QA_SUPERADMIN_PASSWORD }}
          QA_MANAGER_EMAIL: ${{ secrets.QA_MANAGER_EMAIL }}
          QA_MANAGER_PASSWORD: ${{ secrets.QA_MANAGER_PASSWORD }}
          QA_EMPLOYEE_EMAIL: ${{ secrets.QA_EMPLOYEE_EMAIL }}
          QA_EMPLOYEE_PASSWORD: ${{ secrets.QA_EMPLOYEE_PASSWORD }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  auto-merge:
    name: Auto Merge to Staging
    runs-on: ubuntu-latest
    needs: playwright

    steps:
      - name: Merge PR into staging
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --squash --delete-branch
