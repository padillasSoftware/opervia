name: QA PR

on:
  pull_request:
    branches:
      - staging

jobs:
  playwright:
    name: Playwright QA
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          QA_SUPERADMIN_EMAIL: ${{ secrets.QA_SUPERADMIN_EMAIL }}
          QA_SUPERADMIN_PASSWORD: ${{ secrets.QA_SUPERADMIN_PASSWORD }}
          QA_MANAGER_EMAIL: ${{ secrets.QA_MANAGER_EMAIL }}
          QA_MANAGER_PASSWORD: ${{ secrets.QA_MANAGER_PASSWORD }}
          QA_EMPLOYEE_EMAIL: ${{ secrets.QA_EMPLOYEE_EMAIL }}
          QA_EMPLOYEE_PASSWORD: ${{ secrets.QA_EMPLOYEE_PASSWORD }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/