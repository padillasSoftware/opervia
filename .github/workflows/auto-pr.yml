name: Auto PR to staging

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  auto-pr-to-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if PR already exists
        id: check-pr
        run: |
          PR_EXISTS=$(gh pr list \
            --base staging \
            --head "${GITHUB_REF_NAME}" \
            --state open \
            --json number \
            --jq 'length')

          echo "exists=$PR_EXISTS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR to staging
        if: steps.check-pr.outputs.exists == '0'
        run: |
          gh pr create \
            --base staging \
            --head "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME} → staging" \
            --body "PR generado automáticamente hacia staging."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}